name: advoi

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-advoi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-advoi}
      POSTGRES_DB: ${POSTGRES_DB:-advoi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5438}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-advoi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6382}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Placeholder: main API / orchestration entrypoint
  advoi-api:
    image: advoi/api:local
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    environment:
      ADVOI_API_LISTEN_PORT: "8000"
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      advoi-memory-bridge:
        condition: service_started
    ports:
      - "${ADVOI_API_HOST_PORT:-${ADVOI_API_PORT:-8000}}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  advoi-web:
    image: advoi/web:local
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_LIVEKIT_TOKEN_ENDPOINT: ${NEXT_PUBLIC_LIVEKIT_TOKEN_ENDPOINT:-/api/livekit/token}
        NEXT_PUBLIC_ADVOI_API_URL: ${NEXT_PUBLIC_ADVOI_API_URL:-http://localhost:8010/api}
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    depends_on:
      advoi-api:
        condition: service_healthy
    ports:
      - "${ADVOI_WEB_PORT:-3000}:3000"

  # Self-hosted LiveKit SFU (dev keys in deploy/livekit.yaml — no LiveKit Cloud)
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    profiles: ["app"]
    command: --config /etc/livekit.yaml
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "127.0.0.1:${LIVEKIT_HOST_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "50100-50200:50100-50200/udp"

  advoi-memory-bridge:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.memory.bridge_server"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${ADVOI_MEMORY_BRIDGE_PORT:-8095}:8095"
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-fleet:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "fleet-scout"]
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-briefs:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "brief-curator"]
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-review:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "review-queue"]
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-systems:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "systems-pulse"]
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-memory:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "memory-scout"]
    depends_on:
      redis:
        condition: service_healthy

  advoi-agent-guardian:
    image: advoi/api:local
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    command: ["python", "-m", "advoi.routing.agent_daemon", "guardian-sentinel"]
    depends_on:
      redis:
        condition: service_healthy

  # Pipecat + LiveKit voice agent
  advoi-voice:
    image: advoi/voice:local
    build:
      context: .
      dockerfile: Dockerfile.voice
    restart: unless-stopped
    profiles: ["app"]
    env_file: deploy/.env
    volumes:
      - ${FIRSTMATE_FLEET_PATH:-/opt/firstmate-fleet}:/opt/firstmate-fleet:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      advoi-memory-bridge:
        condition: service_started
      advoi-api:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "${ADVOI_VOICE_PORT:-8080}:8080"

  # Placeholder: OpenTelemetry collector → SigNoz / OTLP backend
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: advoi-network