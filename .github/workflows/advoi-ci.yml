# Reference workflow — NOT a fleet ship gate for ADVoi VPS-direct mode.
# Run manually only: GitHub Actions -> ADVoi CI (reference) -> Run workflow
# Daily gates: T0 pytest on VPS develop + T2 staging-signoff-precheck on host.

name: ADVoi CI (reference)

on:
  workflow_dispatch:

concurrency:
  group: advoi-ci-reference-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest tests/ -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Build Next.js PWA
        working-directory: web
        run: npm run build